version: '3.8'

services:
  # PostgreSQL Database (same as Railway)
  postgres:
    image: postgres:16-alpine
    container_name: flowmate-db
    environment:
      POSTGRES_USER: flowmate_user
      POSTGRES_PASSWORD: flowmate_password
      POSTGRES_DB: flowmate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowmate_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flowmate-network

  # Redis (same as Railway)
  redis:
    image: redis:7-alpine
    container_name: flowmate-cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flowmate-network

  # Backend (local development mode)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flowmate-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://flowmate_user:flowmate_password@postgres:5432/flowmate?sslmode=disable
      REDIS_URL: redis://redis:6379
      API_BASE_URL: http://localhost:3000

      # Flow Blockchain
      FLOW_NETWORK: testnet
      FLOW_ACCESS_NODE: https://rest-testnet.onflow.org
      FLOW_ACCOUNT_ADDRESS: ${FLOW_ACCOUNT_ADDRESS}
      FLOW_ACCOUNT_PRIVATE_KEY: ${FLOW_ACCOUNT_PRIVATE_KEY}
      FLOWMATE_AGENT_CONTRACT: ${FLOWMATE_AGENT_CONTRACT}
      VAULT_MANAGER_CONTRACT: ${VAULT_MANAGER_CONTRACT}
      SCHEDULED_TRANSACTIONS_CONTRACT: ${SCHEDULED_TRANSACTIONS_CONTRACT}

      # Auth
      MAGIC_API_KEY: ${MAGIC_API_KEY}
      MAGIC_SECRET_KEY: ${MAGIC_SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET:-super-secret-key-change-in-production}
      JWT_EXPIRY: 7d

      # AI
      AI_PROVIDER: groq
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: llama-3.1-70b-versatile

      # Frontend
      FRONTEND_PRODUCTION_URL: http://localhost:5173
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    networks:
      - flowmate-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:

networks:
  flowmate-network:
    driver: bridge
