<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="flowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff99;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cc77;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff99;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0088ff;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle with subtle gradient -->
  <circle cx="128" cy="128" r="120" fill="none" stroke="url(#flowGradient)" stroke-width="1" opacity="0.3"/>

  <!-- Outer flowing ring (autonomous circulation) -->
  <g filter="url(#glow)">
    <circle cx="128" cy="128" r="95" fill="none" stroke="url(#flowGradient)" stroke-width="2.5" opacity="0.6" stroke-dasharray="5,3"/>
  </g>

  <!-- Main circular flow paths -->
  <g stroke="url(#flowGradient)" stroke-width="3" fill="none" stroke-linecap="round">
    <!-- Top right flow -->
    <path d="M 128 40 Q 180 60 195 110" opacity="0.9"/>
    <!-- Right bottom flow -->
    <path d="M 200 140 Q 190 190 135 210" opacity="0.85"/>
    <!-- Bottom left flow -->
    <path d="M 105 215 Q 55 200 45 145" opacity="0.9"/>
    <!-- Left top flow -->
    <path d="M 40 115 Q 50 65 110 45" opacity="0.85"/>
  </g>

  <!-- Animated flow arrows (direction indicators) -->
  <g fill="url(#flowGradient)" opacity="0.7">
    <!-- Arrow 1 (top right) -->
    <polygon points="195,110 200,125 185,117"/>
    <!-- Arrow 2 (right bottom) -->
    <polygon points="140,205 145,195 135,210"/>
    <!-- Arrow 3 (bottom left) -->
    <polygon points="45,130 35,125 50,115"/>
    <!-- Arrow 4 (left top) -->
    <polygon points="110,50 115,65 100,55"/>
  </g>

  <!-- Central AI node (autonomous agent) -->
  <g filter="url(#glow)">
    <circle cx="128" cy="128" r="30" fill="url(#accentGradient)" opacity="0.9"/>
    <circle cx="128" cy="128" r="30" fill="none" stroke="url(#flowGradient)" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Inner neural network pattern (AI-powered) -->
  <g stroke="url(#flowGradient)" stroke-width="1.5" fill="none" opacity="0.5">
    <!-- Horizontal line -->
    <line x1="105" y1="128" x2="151" y2="128"/>
    <!-- Vertical line -->
    <line x1="128" y1="105" x2="128" y2="151"/>
    <!-- Diagonal lines -->
    <line x1="115" y1="115" x2="141" y2="141"/>
    <line x1="141" y1="115" x2="115" y2="141"/>
  </g>

  <!-- Central dot (origin point) -->
  <circle cx="128" cy="128" r="4" fill="url(#flowGradient)" filter="url(#glow)"/>

  <!-- Micro flow nodes on perimeter (distributed autonomous operations) -->
  <g fill="url(#flowGradient)" opacity="0.7">
    <!-- Top -->
    <circle cx="128" cy="38" r="3"/>
    <!-- Right -->
    <circle cx="218" cy="128" r="3"/>
    <!-- Bottom -->
    <circle cx="128" cy="218" r="3"/>
    <!-- Left -->
    <circle cx="38" cy="128" r="3"/>
    <!-- Diagonals -->
    <circle cx="195" cy="61" r="2.5" opacity="0.6"/>
    <circle cx="195" cy="195" r="2.5" opacity="0.6"/>
    <circle cx="61" cy="195" r="2.5" opacity="0.6"/>
    <circle cx="61" cy="61" r="2.5" opacity="0.6"/>
  </g>

  <!-- Outer accent glow for modern fintech feel -->
  <circle cx="128" cy="128" r="115" fill="none" stroke="url(#accentGradient)" stroke-width="0.5" opacity="0.3"/>
</svg>